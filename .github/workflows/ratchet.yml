name: Ratchet coverage

# Weekly scheduled job that locks in coverage improvements: if the
# current coverage on main exceeds the thresholds in vitest.config.ts
# by more than 0.05 points on any metric, raise the threshold to the
# new floor and open a bot PR for human review.
#
# Why open a PR (not commit directly): branch protection on main
# requires status checks + review-style verification on every change.
# Direct bot commits also feel intrusive; a PR is auditable and lets
# reviewers reject a change that was technically correct but came at
# a cost (e.g. coverage went up because a flaky test now always passes
# — better to investigate than lock in).
#
# Runs Mondays 09:00 UTC. Manual trigger via workflow_dispatch.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ratchet-coverage
  cancel-in-progress: false

jobs:
  ratchet:
    name: Ratchet coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # We need a full ref so we can push a new branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run pkgs:build

      - name: Run tests with coverage
        run: bun run test -- --coverage

      - name: Ratchet thresholds
        id: ratchet
        run: |
          # exit 0 = updated, 2 = no update needed, 1 = error
          set +e
          bun scripts/ratchet-coverage.ts
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then
            echo "ratchet script errored"
            exit 1
          fi
          echo "updated=$( [ "$code" -eq 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Open PR if thresholds were raised
        if: steps.ratchet.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: |
            chore: ratchet coverage thresholds

            Auto-generated by the weekly ratchet job. Coverage on main
            exceeds the previous thresholds in vitest.config.ts by more
            than the 0.05-point margin — raising the floor to lock in
            the improvement.

            Review the diff against coverage/coverage-summary.json and
            merge if the gain is genuine (vs flaky-test-suddenly-passing).
          PR_BODY: |
            ## Summary

            Weekly ratchet from `.github/workflows/ratchet.yml`. Coverage on `main` improved past the thresholds in `vitest.config.ts` — this PR raises the floor to lock the gain in.

            ## Review checklist

            - [ ] Is the coverage improvement genuine? Compare against `coverage/coverage-summary.json` produced in this CI run.
            - [ ] Was a test added (good) or did a previously-flaky test happen to pass (bad — don't ratchet)?
            - [ ] Are the new thresholds within plausible noise of the actual numbers (1-2 points headroom)?

            If something looks off, close this PR — the next ratchet run will retry next Monday.

            Generated by `scripts/ratchet-coverage.ts`.
        run: |
          set -e
          BRANCH="chore/ratchet-coverage-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vitest.config.ts
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: ratchet coverage thresholds" \
            --body "$PR_BODY"
