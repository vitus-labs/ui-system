name: Release

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'release/**'

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Stable release (main only) ──────────────────────────────────
  stable:
    if: github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # `bun install` runs the root `prepare` script which sets
      # core.hooksPath to .githooks — that hook chains lint+typecheck
      # before every `git push`. In CI it fires when `changesets/action`
      # pushes the Version PR commit / publish tags, which made the
      # action spend minutes re-running typecheck and eventually SIGTERM
      # itself (observed on the 2.2.1 publish — npm publish succeeded but
      # the GitHub Release step was killed before it could run).
      #
      # The workflow already validates lint/build/typecheck/test in
      # explicit steps below, so suppressing the hook here removes pure
      # redundancy — not safety.
      - name: Disable local git hooks for the publish flow
        run: git config core.hooksPath /dev/null

      - name: Lint & Format
        run: bun run lint

      - name: Build all packages
        run: bun run pkgs:build

      - name: Type Check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version-packages
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # Prefer a fine-grained PAT (`RELEASE_PAT`) when present so
          # commits the action pushes to the Version PR's branch trigger
          # downstream workflows (CI on the Version PR). Falls back to
          # the default token, which works for everything except trigger
          # propagation. See CONTRIBUTING.md → Releases → Setup.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # Emit npm provenance attestations — the job already grants
          # `id-token: write` for OIDC trusted publishing; this makes npm
          # actually attach the attestation to every published package.
          NPM_CONFIG_PROVENANCE: 'true'

      # The changesets/action's built-in `createGithubReleases: true`
      # iterates per-package and was observed hanging mid-run on the 2.2.0
      # release after npm publish had already succeeded. Replaced with a
      # single umbrella Release for the suite — matches how other fixed-
      # group monorepos (React, Apollo, Babel) ship.
      - name: Create umbrella GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Injection-safe convention: pass step output through env rather
          # than interpolating `${{ }}` directly into the script body. The
          # content is repo-derived (package names/versions), but env vars
          # can't break shell quoting the way inline interpolation can.
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./packages/core/package.json').version")
          TAG="v${VERSION}"

          # Idempotent tag: skip if it already exists (e.g. retried run).
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} already exists — skipping tag step."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

          # Build a markdown list of every published package@version from
          # the action's structured output.
          PACKAGES=$(printf '%s' "$PUBLISHED_PACKAGES" \
            | jq -r '[.[] | "- `\(.name)@\(.version)`"] | join("\n")')

          BODY=$(cat <<EOF
          All packages in the \`@vitus-labs/*\` suite at **${VERSION}**.

          ## Published

          ${PACKAGES}

          ## Per-package detail

          See each \`packages/*/CHANGELOG.md\` for the package-specific entry generated from the changesets that bumped it.
          EOF
          )

          # Create the Release. `--verify-tag` ensures we point at a real
          # ref. Idempotent via `|| true` if a Release already exists for
          # this tag (manual retry scenario).
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes "${BODY}" \
            --verify-tag \
            || echo "::warning::Release for ${TAG} already exists — skipping creation."

  # ── Prerelease (feature/release branches) ───────────────────────
  prerelease:
    if: github.ref != 'refs/heads/main'
    name: Publish Prerelease
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Same reason as the stable job — the local pre-push hook would
      # re-run typecheck on every push by `changeset publish` and could
      # cancel the action mid-publish.
      - name: Disable local git hooks for the publish flow
        run: git config core.hooksPath /dev/null

      - name: Build all packages
        run: bun run pkgs:build

      - name: Publish snapshot
        env:
          # Same provenance attestation as the stable job — id-token: write
          # is granted workflow-wide.
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          bunx changeset version --snapshot alpha
          # See scripts/rewrite-workspace-peers.mjs — npm publish doesn't
          # rewrite `workspace:` in peerDependencies, only in dependencies.
          # We do it ourselves so the published artifact has valid semver.
          node scripts/rewrite-workspace-peers.mjs
          bunx changeset publish --tag next
